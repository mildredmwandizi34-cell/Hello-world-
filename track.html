<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Shipment | American Global Logistics</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

<img src="image/file_00000000a578724392b06d3f2958c446.png"
     alt="AGL Logo"
     class="logo">

<h1>Track Your Shipment</h1>

<p>Fast • Secure • Reliable Worldwide Delivery</p>

</header>

<nav class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="track.html" class="active">Track Shipment</a>
<a href="contact.html">Contact</a>
</nav>

<section class="section">

<div class="container">

<h2 class="section-title">Shipment Tracking</h2>

<div class="card">

<input
type="text"
id="trackingNumber"
placeholder="Enter Tracking Number"
style="width:100%;padding:15px;font-size:18px;margin-bottom:20px;">

<button
class="btn-primary"
style="width:100%;border:none;padding:15px;font-size:18px;cursor:pointer;"
onclick="trackShipment()">
Track Shipment
</button>

</div>

<div id="result" class="card" style="margin-top:30px;display:none;">

<h3>Shipment Status</h3>

<p><strong>Status:</strong> <span id="status"></span></p>

<p><strong>Current Location:</strong> <span id="location"></span></p>

<p><strong>Estimated Delivery:</strong> <span id="delivery"></span></p>

<p><strong>Route:</strong> <span id="route"></span></p>

<p><strong>History:</strong></p>

<p id="history"></p>

</div>

</div>

</section>

<footer>
<p>© 2026 American Global Logistics. All Rights Reserved.</p>
</footer>

<script>

function trackShipment(){

let tracking=document.getElementById("trackingNumber").value.toUpperCase();

if(tracking==="AGL123456"){

document.getElementById("result").style.display="block";

document.getElementById("status").innerHTML="In Transit";

document.getElementById("location").innerHTML="New York Distribution Center";

document.getElementById("delivery").innerHTML="15 July 2026";

document.getElementById("route").innerHTML="New York → London";

document.getElementById("history").innerHTML=
"✔ Shipment Created<br><br>✔ Picked Up<br><br>✔ Cleared Customs<br><br>✔ In Transit";

}else{

alert("Tracking number not found.");

}

}

</script>

</body>
</html>
