<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Shipment - American Global Logistics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Track Your Shipment</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="tracking.html">Track Shipment</a>
    <a href="contact.html">Contact</a>
</nav>

<section class="container">

<h2>Shipment Tracking</h2>

<p>Enter your tracking number below to check the current status of your shipment.</p>

<form>

<input
type="text"
id="trackingNumber"
placeholder="Enter Tracking Number"
style="width:100%; padding:15px; font-size:18px; margin-bottom:20px; border:1px solid #ccc; border-radius:5px;">

<button type="button" class="button" onclick="trackShipment()">
Track Shipment
</button>

</form>

<div class="card" id="result" style="margin-top:40px; display:none;">
<h3>Shipment Status</h3>

<p><strong>Status:</strong> <span id="status"></span></p>

<p><strong>Current Location:</strong> <span id="location"></span></p>

<p><strong>Estimated Delivery:</strong> <span id="delivery"></span></p>

</div>

</section>

<footer>
<p>© 2026 American Global Logistics Company. All rights reserved.</p>
</footer>

</body>
</html>
<script>

function trackShipment() {

let tracking = document.getElementById("trackingNumber").value.toUpperCase();

let status = "";
let location = "";
let delivery = "";

if (tracking === "AGL123456") {
    status = "In Transit";
    location = "New York Distribution Center";
    delivery = "15 July 2026";
}

else if (tracking === "AGL654321") {
    status = "Delivered";
    location = "London, United Kingdom";
    delivery = "Delivered on 10 July 2026";
}

else if (tracking === "AGL987654") {
    status = "Customs Clearance";
    location = "Dubai, UAE";
    delivery = "17 July 2026";
}

else {
    status = "Tracking Number Not Found";
    location = "-";
    delivery = "-";
}

document.getElementById("status").innerHTML = status;
document.getElementById("location").innerHTML = location;
document.getElementById("delivery").innerHTML = delivery;

document.getElementById("result").style.display = "block";

}

</script>
