<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Shipment | American Global Logistics</title>

<link rel="stylesheet" href="style.css">

<style>
.track-box{
max-width:700px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.track-box input{
width:100%;
padding:15px;
font-size:18px;
margin-bottom:20px;
}

.track-box button{
width:100%;
padding:15px;
background:#ff9800;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

.track-box button:hover{
background:#e68900;
}

#result{
display:none;
margin-top:30px;
line-height:1.8;
}
</style>

</head>

<body>

<header class="hero">

<img src="image/file_00000000a578724392b06d3f2958c446.png" class="hero-image">

<h1>Track Your Shipment</h1>

<p>Fast • Secure • Reliable Worldwide Delivery</p>

</header>

<nav class="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="track.html" class="active">Track Shipment</a>
<a href="contact.html">Contact</a>
</nav>

<section>

<div class="track-box">

<h2>Shipment Tracking</h2>

<input
type="text"
id="trackingNumber"
placeholder="Enter Tracking Number">

<button onclick="trackShipment()">
Track Shipment
</button>

<div id="result">

<h3>Shipment Status</h3>

<p><strong>Status:</strong> <span id="status"></span></p>

<p><strong>Current Location:</strong> <span id="location"></span></p>

<p><strong>Estimated Delivery:</strong> <span id="delivery"></span></p>

<p><strong>Route:</strong> <span id="route"></span></p>

<div id="progressContainer" style="display:none; margin:25px 0;">

<h3>Shipment Progress</h3>

<div style="background:#ddd;height:25px;border-radius:20px;overflow:hidden;">

<div id="progressBar"
style="width:0%;
height:25px;
background:#28a745;
color:white;
text-align:center;
line-height:25px;
font-weight:bold;
transition:width 1s;">
0%
</div>

</div>

</div>

<div id="details"></div>

</div>

</div>

</section>

<footer>

<p>© 2026 American Global Logistics. All Rights Reserved.</p>

</footer>

<script>

function trackShipment(){

let tracking=document.getElementById("trackingNumber").value.toUpperCase();

let shipments={

"AGL123456":{

status:"In Transit",

location:"New York Distribution Center",

delivery:"15 July 2026",

route:"New York → London",

sender:"John Smith",

receiver:"Emma Wilson",

weight:"12.5 kg",

service:"Air Freight",
progress:75,
history:`
✔ 08 Jul 2026 - Shipment Created<br><br>
✔ 09 Jul 2026 - Picked Up (New York)<br><br>
✔ 10 Jul 2026 - Customs Cleared<br><br>
🟠 12 Jul 2026 - In Transit
`

},

"AGL987654":{

status:"Delivered",

location:"London, United Kingdom",

delivery:"Delivered on 11 July 2026",

route:"Chicago → London",

sender:"Michael Brown",

receiver:"Sarah Johnson",

weight:"8.2 kg",

service:"Express Delivery",
progress:100,
history:`
✔ Shipment Created<br><br>
✔ Picked Up<br><br>
✔ Customs Cleared<br><br>
✔ Out For Delivery<br><br>
✔ Delivered
`

}

};

if(shipments[tracking]){

let s=shipments[tracking];

document.getElementById("result").style.display="block";

document.getElementById("status").innerHTML=s.status;

document.getElementById("location").innerHTML=s.location;

document.getElementById("delivery").innerHTML=s.delivery;

document.getElementById("route").innerHTML=s.route;
document.getElementById("progressContainer").style.display="block";

document.getElementById("progressBar").style.width=s.progress+"%";

document.getElementById("progressBar").innerHTML=s.progress+"%";
document.getElementById("details").innerHTML=`

<p><strong>Sender:</strong> ${s.sender}</p>

<p><strong>Receiver:</strong> ${s.receiver}</p>

<p><strong>Weight:</strong> ${s.weight}</p>

<p><strong>Service:</strong> ${s.service}</p>

<hr>

<h3>Shipment History</h3>

${s.history}

`;

}else{

alert("Tracking number not found.");

document.getElementById("result").style.display="none";
document.getElementById("progressContainer").style.display="none";
}

}

</script>

</body>
</html>
