<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | American Global Logistics</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<img src="image/file_00000000fb107243823fd30bcb45f00f.png"
alt="AGL Logo"
class="logo">

<h1>Admin Dashboard</h1>

<p>American Global Logistics Management System</p>

</header>

<nav class="navbar">

<a href="index.html">Website</a>

<a href="create-shipment.html">Create Shipment</a>

<a href="track.html">Track Shipment</a>

<a href="manage-shipments.html">Manage Shipments</a>

<a href="admin-login.html">Logout</a>

</nav>

<section class="section">

<div class="container">

<h2 class="section-title">Dashboard Overview</h2>

<div class="cards">

<div class="card">
<h3>📦 Total Shipments</h3>
<h1 id="totalShipments">0</h1>
</div>

<div class="card">
<h3>🚚 In Transit</h3>
<h1 id="transitCount">0</h1>
</div>

<div class="card">
<h3>✅ Delivered</h3>
<h1 id="deliveredCount">0</h1>
</div>

<div class="card">
<h3>⏳ Awaiting Pickup</h3>
<h1 id="awaitingCount">0</h1>
</div>

</div>

<h2 class="section-title">Update Shipment</h2>

<div class="card">

<input
type="text"
id="trackingSearch"
placeholder="Enter Tracking Number"
style="width:100%;padding:15px;margin-bottom:15px;">

<button
onclick="loadShipment()"
class="btn-primary">
Load Shipment
</button>

<br><br>

<label>Status</label>

<select
id="statusUpdate"
style="width:100%;padding:15px;margin-bottom:15px;">

<option>Shipment Created</option>
<option>Awaiting Pickup</option>
<option>Picked Up</option>
<option>In Transit</option>
<option>Customs Cleared</option>
<option>Arrived at Destination Hub</option>
<option>Out for Delivery</option>
<option>Delivered</option>

</select>

<input
type="number"
id="progressUpdate"
placeholder="Progress (%)"
min="0"
max="100"
style="width:100%;padding:15px;margin-bottom:15px;">

<input
type="text"
id="locationUpdate"
placeholder="Current Location"
style="width:100%;padding:15px;margin-bottom:15px;">

<button
onclick="updateShipment()"
class="btn-primary">
Update Shipment
</button>

</div>

<h2 class="section-title">Manage Shipments</h2>

<div class="card">

<table
style="width:100%;border-collapse:collapse;">

<thead>

<tr>

<th>Tracking</th>

<th>Sender</th>

<th>Receiver</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="shipmentTable">

</tbody>

</table>

</div>

</div>

</section>

<script src="admin.js"></script>

</body>

    </html>
