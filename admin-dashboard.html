<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | American Global Logistics</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f7fb;
}

.header{
    background:#0b4ea2;
    color:white;
    text-align:center;
    padding:25px;
}

.logo{
    width:90px;
    margin-bottom:10px;
}

.navbar{
    background:#083b80;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.navbar a{
    color:white;
    text-decoration:none;
    padding:16px 20px;
}

.navbar a:hover{
    background:#0b4ea2;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:25px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.card h3{
    margin-top:0;
    color:#0b4ea2;
}

.btn-primary{
    background:#0b4ea2;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.btn-primary:hover{
    background:#083b80;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin:8px 0 18px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
}

.update-box{
    margin-top:40px;
}

</style>

</head>

<body>

<header class="header">

<img src="image/file_00000000fb107243823fd30bcb45f00f.png"
class="logo">

<h1>American Global Logistics</h1>

<p>Administration Dashboard</p>

</header>

<nav class="navbar">

<a href="index.html">Website</a>

<a href="create-shipment.html">Create Shipment</a>

<a href="track.html">Track Shipment</a>

<a href="manage-shipments.html">Manage Shipments</a>

<a href="admin-login.html">Logout</a>

</nav>

<div class="container">

<h2>Dashboard Overview</h2>

<div class="cards">

<div class="card">
<h3>Total Shipments</h3>
<h1 id="totalShipments">0</h1>
</div>

<div class="card">
<h3>In Transit</h3>
<h1 id="inTransit">0</h1>
</div>

<div class="card">
<h3>Delivered</h3>
<h1 id="delivered">0</h1>
</div>

<div class="card">
<h3>Awaiting Pickup</h3>
<h1 id="awaiting">0</h1>
</div>

</div>

<div class="card update-box">

<h2>Load Shipment</h2>

<input
type="text"
id="trackingSearch"
placeholder="Enter Tracking Number">

<button
class="btn-primary"
onclick="loadShipment()">

Load Shipment

</button>

<hr>

<h2>Edit Shipment</h2>

<label>Status</label>
    
<select id="statusUpdate">

<option>Shipment Created</option>

<option>Awaiting Pickup</option>

<option>Picked Up</option>

<option>In Transit</option>

<option>Customs Cleared</option>

<option>Arrived at Destination Hub</option>

<option>Out for Delivery</option>

<option>Delivered</option>

</select>

<label>Current Location</label>

<input
type="text"
id="locationUpdate">
    
<label>Delivery Date</label>

<input
type="text"
id="deliveryUpdate">

<label>Route</label>

<input
type="text"
id="routeUpdate">

<label>Progress (%)</label>
<input
type="number"
id="progressUpdate"
min="0"
max="100"
readonly>
<label>Sender</label>

<input
type="text"
id="senderUpdate">

<label>Receiver</label>

<input
type="text"
id="receiverUpdate">

<label>Package</label>

<input
type="text"
id="packageUpdate">

<label>Weight</label>

<input
type="text"
id="weightUpdate">

<label>Shipping Service</label>

<select id="serviceUpdate">

<option>Air Freight</option>
<option>Ocean Freight</option>
<option>Road Transport</option>
<option>Express Delivery</option>

</select>

<label>Shipment History</label>

<textarea
id="historyUpdate"></textarea>

<div style="margin-top:20px;display:flex;gap:15px;flex-wrap:wrap;">

<button
class="btn-primary"
onclick="updateShipment()">

💾 Save Changes

</button>

<button
style="background:#d32f2f;color:white;border:none;padding:12px 25px;border-radius:6px;cursor:pointer;"
onclick="deleteCurrentShipment()">

🗑 Delete Shipment

</button>

</div>

</div>

<h2 style="margin-top:40px;">All Shipments</h2>

<div class="card">

<table
style="width:100%;border-collapse:collapse;">

<thead>

<tr style="background:#0b4ea2;color:white;">

<th style="padding:12px;">Tracking</th>

<th style="padding:12px;">Sender</th>

<th style="padding:12px;">Receiver</th>

<th style="padding:12px;">Status</th>

<th style="padding:12px;">Progress</th>

</tr>

</thead>

<tbody id="shipmentTable">

</tbody>

</table>

</div>

</div>

<script src="admin.js"></script>

</body>

</html>
