<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Shipments | American Global Logistics</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

<img src="image/file_00000000fb107243823fd30bcb45f00f.png"
alt="AGL Logo"
class="logo">

<h1>Manage Shipments</h1>

<p>Administrator Control Panel</p>

</header>

<nav class="navbar">
<a href="admin-dashboard.html">Dashboard</a>
<a href="create-shipment.html">Create Shipment</a>
<a href="track.html">Track Shipment</a>
<a href="index.html">Website</a>
</nav>

<section class="section">

<div class="container">

<h2 class="section-title">Shipment List</h2>

<input
type="text"
id="searchInput"
placeholder="Search Tracking Number..."
style="width:100%;padding:15px;margin-bottom:20px;">

<table style="width:100%;border-collapse:collapse;background:#fff;">

<thead>
<tr style="background:#0b4ea2;color:white;">
<th style="padding:12px;">Tracking No.</th>
<th>Sender</th>
<th>Receiver</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="shipmentTable">
</tbody>

</table>

</div>

</section>

<footer>

<p>© 2026 American Global Logistics</p>

</footer>

<script>
document.getElementById("searchInput").addEventListener("keyup", function(){

let filter=this.value.toUpperCase();

let rows=document.querySelectorAll("table tr");

for(let i=1;i<rows.length;i++){

let tracking=rows[i].cells[0].innerText;

if(tracking.toUpperCase().indexOf(filter)>-1){

rows[i].style.display="";

}else{

rows[i].style.display="none";

}

}

});
</script>
<script src="admin.js"></script>
</body>
  </html>
